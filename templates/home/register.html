<!DOCTYPE html>
<html>
<head>

    <title>Passenger Registration</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            min-height:100vh;
            background:
                linear-gradient(
                    rgba(0,35,80,0.72),
                    rgba(0,35,80,0.72)
                ),
                linear-gradient(
                    135deg,
                    #003366,
                    #0052cc,
                    #0099ff
                );

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px 20px;

            overflow-x:hidden;
        }


        /* Animated Background Circles */

        body::before,
        body::after{

            content:"";

            position:fixed;

            width:350px;
            height:350px;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            animation:float 6s ease-in-out infinite;

            z-index:-1;
        }

        body::before{
            top:-120px;
            left:-100px;
        }

        body::after{
            bottom:-150px;
            right:-100px;
            animation-delay:2s;
        }


        @keyframes float{

            0%,100%{
                transform:translateY(0) scale(1);
            }

            50%{
                transform:translateY(-25px) scale(1.05);
            }

        }


        /* Registration Card */

        .container{

            width:100%;
            max-width:500px;

            background:rgba(255,255,255,0.97);

            padding:35px;

            border-radius:20px;

            box-shadow:
                0 15px 40px rgba(0,0,0,0.3);

            animation:slideUp 0.7s ease;

        }


        @keyframes slideUp{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }


        /* Header */

        .header{

            text-align:center;

            margin-bottom:25px;

        }

        .icon{

            font-size:48px;

            animation:pulse 2s infinite;

        }


        @keyframes pulse{

            0%,100%{
                transform:scale(1);
            }

            50%{
                transform:scale(1.08);
            }

        }


        h1{

            margin:8px 0;

            color:#003366;

            font-size:28px;

        }


        .subtitle{

            color:#777;

            font-size:14px;

            margin:0;

        }


        /* Messages */

        .message{

            padding:12px;

            border-radius:8px;

            text-align:center;

            margin-bottom:15px;

            font-weight:bold;

        }


        .error{

            background:#f8d7da;

            color:#842029;

        }


        .success{

            background:#d1e7dd;

            color:#0f5132;

        }


        /* Form */

        .form-group{

            margin-bottom:15px;

        }


        label{

            display:block;

            color:#003366;

            font-size:14px;

            font-weight:bold;

            margin-bottom:6px;

        }


        input,
        select,
        textarea{

            width:100%;

            padding:13px 14px;

            border:1px solid #d0d7e2;

            border-radius:8px;

            font-family:Arial;

            font-size:15px;

            background:#fafcff;

            transition:all 0.3s ease;

        }


        input:focus,
        select:focus,
        textarea:focus{

            outline:none;

            border-color:#0052cc;

            background:white;

            box-shadow:
                0 0 0 3px rgba(0,82,204,0.12);

            transform:translateY(-1px);

        }


        textarea{

            min-height:80px;

            resize:vertical;

        }


        /* Two Column Layout */

        .row{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:15px;

        }


        /* Button */

        button{

            width:100%;

            padding:14px;

            margin-top:10px;

            background:#0052cc;

            color:white;

            border:none;

            border-radius:25px;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            transition:all 0.3s ease;

        }


        button:hover{

            background:#003d99;

            transform:translateY(-3px);

            box-shadow:
                0 7px 15px rgba(0,82,204,0.35);

        }


        button:active{

            transform:translateY(0);

        }


        /* Login Link */

        .login-link{

            text-align:center;

            margin-top:22px;

            color:#666;

            font-size:14px;

        }


        .login-link a{

            color:#0052cc;

            text-decoration:none;

            font-weight:bold;

        }


        .login-link a:hover{

            text-decoration:underline;

        }


        /* Mobile */

        @media(max-width:600px){

            body{

                padding:20px 15px;

            }

            .container{

                padding:25px 20px;

            }

            .row{

                grid-template-columns:1fr;

                gap:0;

            }

        }

    </style>

</head>


<body>


<div class="container">


    <!-- Header -->

    <div class="header">

        <div class="icon">
            🚆
        </div>

        <h1>
            Passenger Registration
        </h1>

        <p class="subtitle">
            Create your account to access smart railway services
        </p>

    </div>


    <!-- Error Message -->

    {% if error %}

    <div class="message error">

        ⚠️ {{ error }}

    </div>

    {% endif %}


    <!-- Success Message -->

    {% if success %}

    <div class="message success">

        ✅ {{ success }}

    </div>

    {% endif %}


    <!-- Registration Form -->

    <form method="POST">

        {% csrf_token %}


        <!-- Name and Email -->

        <div class="row">


            <div class="form-group">

                <label>
                    Full Name
                </label>

                <input
                    type="text"
                    name="full_name"
                    placeholder="Enter your full name"
                    value="{{ full_name|default:'' }}"
                    required
                >

            </div>


            <div class="form-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    value="{{ email|default:'' }}"
                    required
                >

            </div>


        </div>


        <!-- Username -->

        <div class="form-group">

            <label>
                Username
            </label>

            <input
                type="text"
                name="username"
                placeholder="Choose a username"
                value="{{ username|default:'' }}"
                required
            >

        </div>


        <!-- Aadhaar and Phone -->

        <div class="row">


            <div class="form-group">

                <label>
                    Aadhaar Number
                </label>

                <input
                    type="text"
                    name="aadhaar_number"
                    placeholder="Enter 12-digit Aadhaar"
                    value="{{ aadhaar_number|default:'' }}"
                    maxlength="12"
                    required
                >

            </div>


            <div class="form-group">

                <label>
                    Phone Number
                </label>

                <input
                    type="text"
                    name="phone_number"
                    placeholder="Enter 10-digit phone"
                    value="{{ phone_number|default:'' }}"
                    maxlength="10"
                    required
                >

            </div>


        </div>


        <!-- Gender -->

        <div class="form-group">

            <label>
                Gender
            </label>

            <select name="gender" required>

                <option value="">
                    Select Gender
                </option>

                <option
                    value="Male"
                    {% if gender == "Male" %}selected{% endif %}
                >
                    Male
                </option>

                <option
                    value="Female"
                    {% if gender == "Female" %}selected{% endif %}
                >
                    Female
                </option>

                <option
                    value="Other"
                    {% if gender == "Other" %}selected{% endif %}
                >
                    Other
                </option>

            </select>

        </div>


        <!-- Address -->

        <div class="form-group">

            <label>
                Address
            </label>

            <textarea
                name="address"
                placeholder="Enter your address"
            >{{ address|default:'' }}</textarea>

        </div>


        <!-- Password -->

        <div class="row">


            <div class="form-group">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Create a password"
                    required
                >

            </div>


            <div class="form-group">

                <label>
                    Confirm Password
                </label>

                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm your password"
                    required
                >

            </div>


        </div>


        <!-- Submit Button -->

        <button type="submit">

            🚆 Create Passenger Account

        </button>


    </form>


    <!-- Login -->

    <div class="login-link">

        Already have an account?

        <a href="/login/">
            Login here
        </a>

    </div>


</div>


</body>
</html>
