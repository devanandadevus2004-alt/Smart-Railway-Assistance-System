<!DOCTYPE html>
<html>
<head>
    <title>Luggage Transfer Booking</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#e8f0fe;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px gray;
        }

        h2{
            text-align:center;
            color:#003366;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#0052cc;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        a{
            text-decoration:none;
            color:#0052cc;
        }

        p{
            text-align:center;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Luggage Transfer Booking</h2>
{% if success %}
<p style="color:green; text-align:center;">
    {{ success }}
</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <select name="source_station" required>
    <option value="">Select Source Station</option>
    {% for station in stations %}
        <option value="{{ station.id }}">
            {{ station.station_name }} ({{ station.station_code }})
        </option>
    {% endfor %}
</select>

    <select name="destination_station" required>
    <option value="">Select Destination Station</option>
    {% for station in stations %}
        <option value="{{ station.id }}">
            {{ station.station_name }} ({{ station.station_code }})
        </option>
    {% endfor %}
</select>

    <select name="luggage_type" required>
        <option value="">Select Luggage Type</option>
        <option value="Suitcase">Suitcase</option>
        <option value="Backpack">Backpack</option>
        <option value="Carton Box">Carton Box</option>
        <option value="Parcel">Parcel</option>
        <option value="Other">Other</option>
    </select>

    <input type="number" name="number_of_bags" placeholder="Number of Bags" min="1" required>

    <input type="number" step="0.1" name="weight" placeholder="Total Weight (kg)" required>

    <input type="date" name="travel_date" required>

    <input type="tel" name="contact_number" placeholder="Contact Number" required>

    <button type="submit">Book Luggage Transfer</button>

</form>

<p>
<a href="/dashboard/">← Back to Dashboard</a>
</p>

</div>

</body>
</html>
