<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#e8f0fe;
        }

        .container{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px gray;
        }

        h2{
            text-align:center;
            color:#003366;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0052cc;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        p{
            text-align:center;
        }

        a{
            color:#0052cc;
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Passenger Login</h2>

<form>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</form>

<p>
Don't have an account?
<a href="/register/">Register</a>
</p>

</div>

</body>
</html>
