<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#e8f0fe;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px gray;
        }

        h2{
            text-align:center;
            color:#003366;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0052cc;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        p{
            text-align:center;
        }

        a{
            color:#0052cc;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Passenger Registration</h2>

{% if success %}
<p style="color:green; text-align:center;">
    {{ success }}
</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="full_name" placeholder="Full Name">

    <input type="email" name="email" placeholder="Email">

    <input type="text" name="username" placeholder="Username">

    <input type="password" name="password" placeholder="Password">

    <button>Create Account</button>

</form>

<p>
Already have an account?
<a href="/login/">Login</a>
</p>

</div>

</body>
</html>
